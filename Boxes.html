<!doctype html>

<html lang="en">

<head>
    <meta charset="utf-8">
    <title>demo</title>
    <style>
        body {
            background-size: cover;
            background: #4112fb;
            background: linear-gradient(0deg, rgba(65, 18, 251, 1) 0%, rgba(15, 255, 243, 1) 74%);
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }

        div {
            background-color: rgb(111, 0, 0);
            border: 8px solid rgb(0, 0, 0);
            width: 350px;
            height: 150px;
            padding: 25px;
            margin: 50px;
            border-radius: 30px;
        }

        #one {
            margin-left: auto;
            margin-right: auto;
            padding-left: 70px;
        }

        #two {
            width: 200px;
            height: 90px;
            margin-left: 175px;
            color: blue;
            background: #fb3f3f;
            background: radial-gradient(circle, rgba(251, 63, 63, 1) 0%, rgba(74, 251, 18, 1) 59%, rgba(6, 209, 199, 1) 86%);
        }

        #three {
            background-color: rgb(230, 109, 10);
            border-color: aliceblue;
            height: 600px;
            width: 500px;
            margin-top: 145px;
            margin-left: auto;
        }

        .TextThree {
            font-size: 30px;
            text-decoration: underline;
            text-align: right;
        }

        #four {
            background: #ecfa28;
            background: linear-gradient(220deg, rgba(236, 250, 40, 1) 0%, rgba(237, 83, 204, 1) 100%);
            color: rgb(0, 0, 0);
            border-top-width: 100px;
            border-top-color: blueviolet;
            border-bottom-width: 20px;
            border-bottom-color: teal;
            border-left-width: 3px;
            border-left-color: rgb(255, 0, 0);
            border-right-width: 45px;
            border-right-color: yellow;
            border-top-left-radius: 130px;
            border-top-right-radius: 250px;
            border-bottom-left-radius: 0px;
        }
    </style>
</head>

<body>
    <div id="one">
        <p>This is a box</p>
    </div>

    <div id="two">
        <p>This is another box</p>
    </div>

    <div id="three">
        <p class="TextThree">This is a third box</p>
        <div id="four">
            <p>This is getting absurd</p>
        </div>
    </div>
</body>

</html>
