<!doctype html>

<html lang="en">

<head>
    <meta charset="utf-8">
    <title>demo</title>
    <style>
        body {
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            color: #242a93;
            background: rgb(139, 108, 205);
        }

        .bill {
            color: rgb(205, 9, 9);
            font-size: 20px;
        }

        .tom {
            color: darkturquoise;
            font-size: 20px;
        }

        p {
            color: rgb(0, 0, 0);
            font-size: 25px;
        }

        h1 {
            font-size: 50px;
        }

        ul {
            margin: 0%;
            padding: 0%;
            list-style-type: none;
        }

        ul li a {
            text-align: center;
            color: rgb(0, 0, 0);
            display: block;
            background-color: rgb(86, 186, 181);
            height: 40px;
            width: 175px;
            margin: 25px;
            border: 3px solid black;
            border-radius: 15px;
            box-shadow: 10px 10px 10px rgba(0, 0, 0, 0.53);
            scale: 1;
            transition: color 0.5s, background-color 0.5s, box-shadow 1s, scale 0.5s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        ul li a:hover {
            background-color: #242a93;
            color: aliceblue;
            box-shadow: 10px 10px 10px rgba(0, 0, 0, 0.8);
            scale: 1.1;
        }
    </style>
</head>

<body>
    <h1>Hi, I'm Joey</h1>
    <p>Welcome to my page. Here's some of my stuff.</p>
    <p class="bill"><span class="tom">Meow</span> Meow</p>

        <li><a href="text.html">Text page</a></li>
        <li><a href="Boxes.html">Boxes practice</a></li>
        <li><a href="quotes.html">Quotes</a></li>
    </ul>
</body>

</html>
