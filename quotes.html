<!doctype html>

<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Quotes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Bruno+Ace+SC&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: rgb(186, 127, 214);
        }

        .quoteone {
            font-size: 30px;
            text-decoration: underline;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }

        .personone {
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }

        .quotetwo {
            color: aqua;
            font-size: 25px;
            font-family: "Audiowide", sans-serif;
        }

        .persontwo {
            text-align: right;
            color: aqua;
            font-family: "Audiowide", sans-serif;
        }

        .quotethree {
            text-align: center;
            color: green;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            font-size: 50px;
            margin-bottom: 0px;
        }

        hr {
            color: black;
        }

        .personthree {
            text-align: center;
            color: rgb(255, 255, 255);
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            font-size: 20px;
        }

        .red {
            color: darkred;
        }
    </style>
</head>

<body>
    <p class="quoteone">Really wise words about something super complex.</p>
    <p class="personone">- Someone really smart who you should listen to</p>
    <hr>
    <p class="quotetwo">Beep boop. I am a robot.</p>
    <p class="persontwo">- A Robot</p>
    <hr>
    <p class="quotethree">Ho <span class="red">Ho</span> Ho!</p>
    <p class="personthree">- Santa <span class="red">Claus</span></p>
    <hr>
</body>

</html>
